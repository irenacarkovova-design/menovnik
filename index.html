<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <title>Měnovník</title>
</head>
<body>
    <div class="app-container">
        <h1>Měnovník</h1>
        <div class="converter">
            <input type="number" id="amount" placeholder="Zadejte částku" value="1" />
            <select id="fromCurrency">
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="CZK">CZK</option>
                <option value="ILS">ILS</option>
            </select>
            <span class="arrow">→</span>
            
            <select id="toCurrency">
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="CZK">CZK</option>
                <option value="ILS">ILS</option>
            </select>
        
        <div id="result">Načítám kurzy...</div>
        <p id="status info"></p>
    </div>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

    <div class="calculator-section">
        <h2>Čas na desetinné číslo</h2>
        <div class="time-inputs">
            <input type="number" id="hoursInput" placeholder="Hodiny" value="0" />
            <input type="number" id="minutesInput" placeholder="Minuty" value="0" />
        </div>
        <div id="timeResult">0.00 h</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
